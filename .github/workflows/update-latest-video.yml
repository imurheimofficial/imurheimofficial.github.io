name: Update latest YouTube video

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-latest-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check files
        run: |
          echo "Repository root:"
          ls -la
          echo ""
          echo ".github/workflows:"
          ls -la .github/workflows || true
          echo ""
          echo "scripts:"
          ls -la scripts || true
          echo ""
          echo "api:"
          ls -la api || true

      - name: Check secret presence
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ -z "$YOUTUBE_API_KEY" ]; then
            echo "ERROR: YOUTUBE_API_KEY secret is empty or missing"
            exit 1
          else
            echo "OK: YOUTUBE_API_KEY secret exists"
          fi

      - name: Run updater
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/update_latest_video.py

      - name: Show generated JSON
        run: |
          echo "api/latest-video.json content:"
          cat api/latest-video.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add api/latest-video.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update latest YouTube video"
          git push
